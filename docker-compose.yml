services:
  telegram-api:
    build: .
    container_name: telegram-api
    env_file: .env
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - UPLOADS_PATH=${UPLOADS_PATH:-uploads}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
